<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Unidos — Gastos y mesas de boda</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#6E3B3F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Unidos">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --rose:#52664A;
    --rose-soft:#DEE5D8;
    --indigo:#6E3B3F;
    --indigo-soft:#E9DBDA;
    --gold:#B0872E;
    --gold-soft:#F0E4C7;
    --sage:#5E7D86;
    --sage-soft:#DBE5E7;
    --paper:#EEECE0;
    --card:#F8F6EF;
    --ink:#262420;
    --ink-dim:#948C78;
    --line:#DED8C6;
    --danger:#B03B2E;
    --radius:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:ui-serif,Georgia,"Times New Roman",serif;}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    position:relative;
    padding-bottom:86px;
  }
  header.top{
    padding:22px 20px 14px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
  }
  header.top .title{
    font-family:ui-serif,Georgia,serif;
    font-size:26px;
    font-weight:600;
    letter-spacing:.2px;
  }
  header.top .title .knot{color:var(--rose);}
  header.top .sub{font-size:13px;color:var(--ink-dim);margin-top:2px;}
  .gear{
    width:38px;height:38px;border-radius:50%;
    background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
  }
  .gear svg{width:18px;height:18px;stroke:var(--ink-dim);}

  main{flex:1;padding:0 20px;}

  /* ---------- Hero donut ---------- */
  .hero{
    background:var(--card);
    border-radius:var(--radius);
    padding:22px 20px 20px;
    box-shadow:0 1px 0 rgba(0,0,0,.03);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:16px;
  }
  .hero .ring-wrap{position:relative;width:112px;height:112px;flex-shrink:0;}
  .hero .ring-wrap svg{width:100%;height:100%;}
  .hero .ring-center{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
  }
  .hero .ring-center .lbl{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-dim);}
  .hero .ring-center .amt{font-size:15px;font-weight:700;margin-top:1px;}
  .hero .legend{flex:1;}
  .hero .legend-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:7px;}
  .hero .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .hero .legend-row .name{color:var(--ink-dim);flex:1;}
  .hero .legend-row .val{font-weight:700;}
  .hero .diff{
    margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
    font-size:12px;color:var(--ink-dim);line-height:1.4;
  }

  /* ---------- section headers ---------- */
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:22px 0 10px;
  }
  .section-head h2{font-family:ui-serif,Georgia,serif;font-size:17px;margin:0;font-weight:600;}
  .section-head a.link{font-size:12.5px;color:var(--indigo);cursor:pointer;text-decoration:none;font-weight:600;}

  /* ---------- objetivo cards ---------- */
  .obj-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
    cursor:pointer;
    transition:transform .1s ease;
  }
  .obj-card:active{transform:scale(.99);}
  .obj-top{display:flex;align-items:center;gap:12px;}
  .obj-icon{
    width:42px;height:42px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;
  }
  .obj-name{font-weight:700;font-size:15px;}
  .obj-cat-count{font-size:12px;color:var(--ink-dim);margin-top:1px;}
  .obj-total{margin-left:auto;text-align:right;}
  .obj-total .amt{font-weight:700;font-size:15px;}
  .obj-total .meta{font-size:11px;color:var(--ink-dim);}
  .obj-bar-track{height:6px;background:var(--line);border-radius:4px;margin-top:12px;overflow:hidden;}
  .obj-bar-fill{height:100%;border-radius:4px;background:var(--gold);}
  .obj-split{display:flex;height:6px;border-radius:4px;overflow:hidden;margin-top:12px;background:var(--line);}

  .sub-list{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);}
  .sub-row{margin-bottom:9px;}
  .sub-row:last-child{margin-bottom:0;}
  .sub-row-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;}
  .sub-row-top span:first-child{color:var(--ink);}
  .sub-row-top .num{font-weight:700;}
  .sub-row-track{height:4px;background:var(--line);border-radius:3px;overflow:hidden;}
  .sub-row-fill{height:100%;border-radius:3px;opacity:.55;}
  .sub-row-warn{font-size:11px;color:var(--danger);font-weight:600;margin-top:4px;}
  .sub-empty{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);font-size:12px;color:var(--ink-dim);}

  .empty{
    text-align:center;padding:34px 16px;color:var(--ink-dim);font-size:13.5px;
    border:1px dashed var(--line);border-radius:var(--radius);line-height:1.6;
  }

  /* ---------- gasto list ---------- */
  .filters{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
  .filters select, .filters input{
    border:1px solid var(--line);background:var(--card);border-radius:99px;
    padding:8px 12px;font-size:12.5px;color:var(--ink);flex-shrink:0;
  }
  .gasto-row{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;
  }
  .gasto-tag{
    width:6px;align-self:stretch;border-radius:4px;flex-shrink:0;
  }
  .gasto-mid{flex:1;min-width:0;}
  .gasto-cat{font-weight:700;font-size:13.5px;}
  .gasto-desc{font-size:12px;color:var(--ink-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gasto-meta{font-size:11px;color:var(--ink-dim);margin-top:3px;display:flex;gap:6px;align-items:center;}
  .who-chip{
    font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;
  }
  .gasto-right{text-align:right;flex-shrink:0;}
  .gasto-amt{font-weight:700;font-size:14.5px;}
  .gasto-del{
    background:none;border:none;color:var(--ink-dim);font-size:11px;
    margin-top:4px;cursor:pointer;padding:0;
  }

  /* ---------- mesas ---------- */
  .ref-row{display:flex;gap:10px;margin-bottom:16px;}
  .ref-chip{
    flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px;text-align:center;font-size:12.5px;font-weight:700;color:var(--ink-dim);
  }
  .ref-estrado{background:var(--indigo);color:#fff;border-color:var(--indigo);}
  .mesa-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .mesa-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 10px;text-align:center;cursor:pointer;
  }
  .mesa-num{
    width:36px;height:36px;border-radius:50%;background:var(--rose-soft);color:var(--rose);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;
    margin:0 auto 8px;
  }
  .mesa-nombre{font-size:12.5px;color:var(--ink-dim);margin-bottom:4px;}
  .mesa-count{font-weight:700;font-size:16px;}
  .mesa-count span{font-weight:400;color:var(--ink-dim);font-size:13px;}
  .mesa-card.mesa-full .mesa-num{background:var(--gold-soft);color:var(--gold);}
  .mesa-card.mesa-over{border-color:var(--danger);}
  .mesa-card.mesa-over .mesa-num{background:#F3DAD6;color:var(--danger);}

  .inv-row{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;
    gap:10px;cursor:pointer;
  }
  .inv-nombre{font-weight:700;font-size:13.5px;}
  .inv-grupo{font-size:11.5px;color:var(--ink-dim);margin-top:1px;}
  .inv-mesa{
    font-size:11px;font-weight:700;padding:5px 10px;border-radius:99px;flex-shrink:0;
    background:var(--rose-soft);color:var(--rose);
  }
  .inv-mesa.inv-sinmesa{background:var(--line);color:var(--ink-dim);}
  .inv-check{
    width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .inv-check.on{background:var(--indigo);border-color:var(--indigo);}
  .inv-check.on::after{content:'✓';color:#fff;font-size:12px;font-weight:800;}
  .inv-row-selected{border-color:var(--indigo);background:var(--indigo-soft);}

  .xls-preview{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--card);}
  .xls-table{border-collapse:collapse;font-size:11px;white-space:nowrap;}
  .xls-table th, .xls-table td{padding:6px 8px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);}
  .xls-table th{background:var(--paper);color:var(--ink-dim);font-weight:700;position:sticky;top:0;}
  .xls-rownum{color:var(--ink-dim);text-align:center;background:var(--paper);}
  .xls-col-name{background:var(--rose-soft);}
  .xls-col-grupo{background:var(--gold-soft);}
  .xls-row-start td{box-shadow:inset 0 2px 0 var(--indigo), inset 0 -2px 0 var(--indigo);}

  /* ---------- bottom nav ---------- */
  nav.tabbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:rgba(247,242,236,.92);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;padding:8px 10px calc(10px + env(safe-area-inset-bottom));
    z-index:40;
  }
  nav.tabbar button{
    flex:1;background:none;border:none;display:flex;flex-direction:column;
    align-items:center;gap:3px;color:var(--ink-dim);font-size:10.5px;cursor:pointer;
    padding:6px 0;font-family:inherit;
  }
  nav.tabbar button.active{color:var(--indigo);}
  nav.tabbar svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;}

  .fab{
    position:fixed;bottom:78px;left:50%;
    transform:translateX(calc(-50% + 200px));
    width:54px;height:54px;border-radius:50%;
    background:var(--indigo);color:#fff;border:none;
    font-size:26px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(62,76,99,.35);cursor:pointer;z-index:41;
  }
  @media (max-width:480px){
    .fab{transform:translateX(calc(-50% + 44vw));}
  }

  /* ---------- modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(43,38,32,.45);
    display:flex;align-items:flex-end;justify-content:center;z-index:60;
  }
  .sheet{
    background:var(--paper);width:100%;max-width:480px;
    border-radius:22px 22px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    max-height:88vh;overflow-y:auto;
  }
  .sheet h3{font-family:ui-serif,Georgia,serif;font-size:19px;margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{font-size:12px;color:var(--ink-dim);font-weight:600;display:block;margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:14.5px;color:var(--ink);font-family:inherit;
  }
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .seg{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .seg button{
    flex:1;border:none;background:var(--card);padding:11px;font-size:13.5px;
    cursor:pointer;color:var(--ink-dim);font-weight:600;font-family:inherit;
  }
  .seg button.on{background:var(--indigo);color:#fff;}
  .btn-primary{
    width:100%;background:var(--indigo);color:#fff;border:none;border-radius:12px;
    padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:6px;
  }
  .btn-ghost{
    width:100%;background:none;border:1px solid var(--line);color:var(--ink-dim);
    border-radius:12px;padding:12px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:600;
  }
  .close-x{
    position:absolute;top:16px;right:18px;background:none;border:none;
    font-size:20px;color:var(--ink-dim);cursor:pointer;
  }
  .icon-pick{display:flex;flex-wrap:wrap;gap:8px;}
  .icon-pick button{
    width:42px;height:42px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);font-size:19px;cursor:pointer;
  }
  .icon-pick button.on{border-color:var(--indigo);background:var(--indigo-soft);}
  .tint-pick{display:flex;gap:8px;}
  .tint-pick .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .tint-pick .sw.on{border-color:var(--ink);}
  .cat-manage{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .cat-chip{
    background:var(--card);border:1px solid var(--line);border-radius:99px;
    padding:6px 10px 6px 12px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;
  }
  .cat-chip button{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:13px;padding:0;}

  .onb-hero{text-align:center;padding:14px 4px 6px;}
  .onb-hero .rings{font-size:36px;}
  .onb-hero h1{font-family:ui-serif,Georgia,serif;font-size:24px;margin:8px 0 4px;}
  .onb-hero p{font-size:13.5px;color:var(--ink-dim);line-height:1.5;margin:0 0 18px;}
  .who-pick{display:flex;gap:10px;margin-top:8px;}
  .who-pick button{
    flex:1;border:1px solid var(--line);background:var(--card);border-radius:14px;
    padding:16px 8px;cursor:pointer;font-family:inherit;
  }
  .who-pick button .em{font-size:24px;display:block;margin-bottom:6px;}
  .who-pick button .nm{font-weight:700;font-size:13.5px;}
  .who-pick button.on{border-color:var(--indigo);background:var(--indigo-soft);}

  ::-webkit-scrollbar{display:none;}

  .upd-banner{
    position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:var(--indigo);color:#fff;
    padding:12px 16px calc(12px + env(safe-area-inset-top));
    padding-top:calc(12px + env(safe-area-inset-top));
    display:flex;align-items:center;gap:10px;
    font-size:13px;z-index:80;
    box-shadow:0 6px 18px rgba(0,0,0,.18);
    animation:slideDown .3s ease;
  }
  @keyframes slideDown{ from{transform:translate(-50%,-100%);} to{transform:translate(-50%,0);} }
  .upd-banner span{flex:1;line-height:1.35;}
  .upd-banner button{
    background:#fff;color:var(--indigo);border:none;border-radius:99px;
    padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;flex-shrink:0;
  }
  .upd-banner .upd-close{
    background:none;color:rgba(255,255,255,.7);padding:4px;font-size:16px;font-weight:400;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const $ = (sel,ctx=document)=>ctx.querySelector(sel);
const $$ = (sel,ctx=document)=>Array.from(ctx.querySelectorAll(sel));
const APP_VERSION = "v14";
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayISO = ()=> new Date().toISOString().slice(0,10);
const fmt = n => {
  const m = (state.data && state.data.moneda) || 'PEN';
  const locale = m === 'USD' ? 'en-US' : 'es-PE';
  return new Intl.NumberFormat(locale,{style:'currency',currency:m,maximumFractionDigits:2}).format(n||0);
};
const currSym = () => ((state.data && state.data.moneda)==='USD' ? '$' : 'S/');
const fmtDate = d => { try{ return new Date(d+'T00:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short'}); }catch(e){return d;} };

const ICONS = ['💍','🌴','🏠','🌱','✈️','🚗','🎓','🍼','💼','🐾','🎁','⭐'];
const TINTS = [
  {id:'rose', bg:'var(--rose-soft)', fg:'var(--rose)'},
  {id:'indigo', bg:'var(--indigo-soft)', fg:'var(--indigo)'},
  {id:'gold', bg:'var(--gold-soft)', fg:'var(--gold)'},
  {id:'sage', bg:'var(--sage-soft)', fg:'var(--sage)'},
];
function tint(id){ return TINTS.find(t=>t.id===id) || TINTS[0]; }

function defaultData(){
  return {
    parejaNombres: { novio:'Novio', novia:'Novia' },
    moneda: 'PEN',
    objetivos: [
      { id:'boda', nombre:'Boda', icono:'💍', tint:'rose', meta:null,
        subobjetivos:['Local y Banquete','Fotografía y Video','Vestido y Traje','Flores y Decoración','Música y DJ','Invitaciones','Anillos','Transporte','Belleza','Trámites y Licencia','Detalles para invitados','Pastel','Imprevistos','Otros'].map(nombre=>({id:uid(),nombre,meta:null})) },
      { id:'luna-de-miel', nombre:'Luna de Miel', icono:'🌴', tint:'gold', meta:null,
        subobjetivos:['Vuelos','Alojamiento','Actividades y Tours','Comida','Transporte local','Compras','Seguro de viaje','Otros'].map(nombre=>({id:uid(),nombre,meta:null})) },
      { id:'casa', nombre:'Casa', icono:'🏠', tint:'indigo', meta:null,
        subobjetivos:['Muebles','Electrodomésticos','Remodelación','Servicios básicos','Decoración','Otros'].map(nombre=>({id:uid(),nombre,meta:null})) },
      { id:'ahorro-terreno', nombre:'Ahorro para Terreno', icono:'🌱', tint:'sage', meta:null,
        subobjetivos:['Aporte de ahorro','Trámites legales','Otros'].map(nombre=>({id:uid(),nombre,meta:null})) },
    ],
    gastos: [],
    mesas: [
      { id:'mesa-1', numero:1, nombre:'Mesa 1', asientos:10 },
      { id:'mesa-2', numero:2, nombre:'Mesa 2', asientos:10 },
      { id:'mesa-3', numero:3, nombre:'Mesa 3', asientos:10 },
      { id:'mesa-4', numero:4, nombre:'Mesa 4', asientos:10 },
      { id:'mesa-5', numero:5, nombre:'Mesa 5', asientos:10 },
      { id:'mesa-6', numero:6, nombre:'Mesa 6', asientos:10 },
    ],
    invitados: []
  };
}

// Compatibilidad con datos guardados antes de que existieran los sub objetivos:
// convierte "categorias" (strings sueltos) en "subobjetivos" (objetos con id y meta propia)
// y reasigna cada gasto viejo (que tenía "categoria" como texto) a su nuevo subobjetivoId.
function migrateData(data){
  let changed = false;
  if(!data.mesas){
    data.mesas = [
      { id:'mesa-1', numero:1, nombre:'Mesa 1', asientos:10 },
      { id:'mesa-2', numero:2, nombre:'Mesa 2', asientos:10 },
      { id:'mesa-3', numero:3, nombre:'Mesa 3', asientos:10 },
      { id:'mesa-4', numero:4, nombre:'Mesa 4', asientos:10 },
      { id:'mesa-5', numero:5, nombre:'Mesa 5', asientos:10 },
      { id:'mesa-6', numero:6, nombre:'Mesa 6', asientos:10 },
    ];
    changed = true;
  }
  if(!data.invitados){ data.invitados = []; changed = true; }
  data.objetivos.forEach(o=>{
    if(!o.subobjetivos){
      o.subobjetivos = (o.categorias||[]).map(nombre=>({id:uid(), nombre, meta:null}));
      delete o.categorias;
      changed = true;
    }
  });
  data.gastos.forEach(g=>{
    if(!g.subobjetivoId && g.categoria){
      const obj = data.objetivos.find(o=>o.id===g.objetivoId);
      if(obj){
        let so = obj.subobjetivos.find(s=>s.nombre===g.categoria);
        if(!so){ so = {id:uid(), nombre:g.categoria, meta:null}; obj.subobjetivos.push(so); }
        g.subobjetivoId = so.id;
      }
      delete g.categoria;
      changed = true;
    }
  });
  return changed;
}

let state = {
  data: null,
  perfil: null,

async function loadShared(){

    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/unidos_data?id=eq.${SUPABASE_ROW_ID}&select=payload`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }

    }

function computeTotals(data){
  const totals = { total:0, novio:0, novia:0, porObjetivo:{}, porSubobjetivo:{} };
  data.objetivos.forEach(o=>{
    totals.porObjetivo[o.id] = {total:0, novio:0, novia:0};
    (o.subobjetivos||[]).forEach(s=>{ totals.porSubobjetivo[s.id] = {total:0, novio:0, novia:0}; });
  });
  data.gastos.forEach(g=>{
    totals.total += g.monto;
    totals[g.quien] = (totals[g.quien]||0) + g.monto;
    if(!totals.porObjetivo[g.objetivoId]) totals.porObjetivo[g.objetivoId] = {total:0,novio:0,novia:0};
    totals.porObjetivo[g.objetivoId].total += g.monto;
    totals.porObjetivo[g.objetivoId][g.quien] += g.monto;
    if(g.subobjetivoId){
      if(!totals.porSubobjetivo[g.subobjetivoId]) totals.porSubobjetivo[g.subobjetivoId] = {total:0,novio:0,novia:0};
      totals.porSubobjetivo[g.subobjetivoId].total += g.monto;
      totals.porSubobjetivo[g.subobjetivoId][g.quien] += g.monto;
    }
  });
  return totals;
}

/* ---------------- resumen ---------------- */
function donutSVG(pctA, pctB, colorA, colorB, size=112, stroke=12){
  const r = 50 - stroke/2;
  const c = 2*Math.PI*r;
  const lenA = c*pctA;
  const lenB = c*pctB;
  return `
  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--line)" stroke-width="${stroke}"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${colorA}" stroke-width="${stroke}"
      stroke-dasharray="${lenA} ${c-lenA}" stroke-dashoffset="0" transform="rotate(-90 50 50)" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${colorB}" stroke-width="${stroke}"
      stroke-dasharray="${lenB} ${c-lenB}" stroke-dashoffset="${-lenA}" transform="rotate(-90 50 50)" stroke-linecap="round"/>
  </svg>`;
}

  const diff = t.novio - t.novia;
  let diffText = 'Ambos han aportado lo mismo hasta ahora.';
  if(Math.abs(diff) > 0.009){
    diffText = diff>0
      ? `${nombres.novio} ha aportado ${fmt(diff)} más que ${nombres.novia}.`
      : `${nombres.novia} ha aportado ${fmt(-diff)} más que ${nombres.novio}.`;
  }

  const objCards = state.data.objetivos.map(o=>{
    const ot = t.porObjetivo[o.id] || {total:0,novio:0,novia:0};
    const tn = tint(o.tint);

    return `
    <div class="obj-card" data-obj="${o.id}">

  return `
  <div class="hero">
    <div class="ring-wrap">
      ${donutSVG(pctNovio,pctNovia,'var(--indigo)','var(--rose)')}

      <div class="legend-row"><span class="dot" style="background:var(--rose)"></span><span class="name">${nombres.novia}</span><span class="val num">${fmt(t.novia)}</span></div>

function recentGastosHTML(n){
  const list = [...state.data.gastos].sort((a,b)=> b.fecha.localeCompare(a.fecha) || b.id.localeCompare(a.id)).slice(0,n);
  if(list.length===0) return `<div class="empty">Todavía no registran gastos. Toca el botón "+" para agregar el primero.</div>`;
  return list.map(g=>gastoRowHTML(g)).join('');
}

    const pctNovio = ot.total>0 ? ot.novio/ot.total : 0.5;
    const pctNovia = ot.total>0 ? ot.novia/ot.total : 0.5;
    const pctMeta = o.meta ? Math.min(100, Math.round((ot.total/o.meta)*100)) : null;

    const subRows = [...o.subobjetivos]
      .sort((a,b)=> (t.porSubobjetivo[b.id]?.total||0) - (t.porSubobjetivo[a.id]?.total||0))
      .map(s=>{

        <div class="sub-row">
          <div class="sub-row-top">

    return `

function getFilteredInvitados(){

  list.sort((a,b)=> a.nombre.localeCompare(b.nombre));
  return list;
}

async function handleExcelFile(file){
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
    if(!raw.length){ alert('El archivo está vacío.'); return; }
    openImportPreviewModal(raw);
  }catch(e){
    console.error(e);
    alert('No se pudo leer el archivo. Asegúrate de que sea un Excel (.xlsx) o CSV válido.');
  }
}

function colLetter(i){
  let s = '', n = i+1;
  while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); }
  return s;
}

function normNombre(s){
  return String(s||'')
    .trim()
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ');
}

function guessNameCol(raw){
  for(let r=0;r<Math.min(8,raw.length);r++){
    for(let c=0;c<raw[r].length;c++){
      const txt = String(raw[r][c]||'').trim().toLowerCase();
      if(txt.length<=18 && /^(nombre|nombres|invitado|invitados|guest|name)s?( completo)?$/.test(txt)){
        return { col:c, headerRow:r };
      }
    }
  }
  const maxCols = Math.max(...raw.map(r=>r.length));
  let best=0, bestCount=-1;
  for(let c=0;c<maxCols;c++){
    let count=0;
    raw.forEach(r=>{ const v=r[c]; if(typeof v==='string' && v.trim().length>2 && /[a-zA-ZáéíóúñÁÉÍÓÚÑ]/.test(v) && isNaN(v)) count++; });
    if(count>bestCount){ bestCount=count; best=c; }
  }
  return { col:best, headerRow:-1 };
}

function openImportPreviewModal(raw){
  const maxCols = Math.min(12, Math.max(...raw.slice(0,25).map(r=>r.length)));
  const guess = guessNameCol(raw);
  let nameCol = guess.col;
  let grupoCol = -1;
  let startRow = guess.headerRow>=0 ? guess.headerRow+1 : 0;

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
  <div class="sheet">
    <button class="close-x" id="closeSheet">✕</button>
    <h3>Importar invitados</h3>
    <p style="font-size:12.5px;color:var(--ink-dim);margin:-8px 0 14px;">Revisa la vista previa de tu archivo y confirma en qué columna están los nombres.</p>
    <div class="xls-preview" id="xlsPreview"></div>
    <div class="field-row" style="margin-top:14px;">
      <div class="field">
        <label>Columna con los nombres</label>
        <select id="pickNameCol"></select>
      </div>
      <div class="field">
        <label>Columna de grupo (opcional)</label>
        <select id="pickGrupoCol"></select>
      </div>
    </div>
    <div class="field">
      <label>¿En qué fila empiezan los invitados?</label>
      <input id="pickStartRow" type="number" min="1" value="${startRow+1}">
    </div>
    <div id="importCount" style="font-size:13px;font-weight:700;margin-bottom:10px;"></div>
    <button class="btn-primary" id="doImportBtn">Importar</button>
    <button type="button" class="btn-ghost" id="cancelImportBtn">Cancelar</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };
  $('#closeSheet',overlay).onclick = ()=> overlay.remove();
  $('#cancelImportBtn',overlay).onclick = ()=> overlay.remove();

  const colOptsHtml = (selectedIdx, withNinguna)=>{
    let html = withNinguna ? `<option value="-1">Ninguna</option>` : '';
    for(let c=0;c<maxCols;c++){
      let sample = '';
      for(let r=0;r<raw.length;r++){ if(raw[r][c] && String(raw[r][c]).trim()){ sample = String(raw[r][c]).trim(); break; } }
      html += `<option value="${c}" ${c===selectedIdx?'selected':''}>${colLetter(c)}${sample?': '+sample.slice(0,16):''}</option>`;
    }
    return html;
  };
  $('#pickNameCol',overlay).innerHTML = colOptsHtml(nameCol, false);
  $('#pickGrupoCol',overlay).innerHTML = colOptsHtml(grupoCol, true);

  function renderPreview(){
    const startIdx = Math.max(1, parseInt($('#pickStartRow',overlay).value)||1) - 1;
    const rows = raw.slice(0, 8);
    let html = '<table class="xls-table"><thead><tr><th></th>';
    for(let c=0;c<maxCols;c++) html += `<th class="${c===nameCol?'xls-col-name':''}${c===grupoCol?' xls-col-grupo':''}">${colLetter(c)}</th>`;
    html += '</tr></thead><tbody>';
    rows.forEach((r,ri)=>{
      html += `<tr class="${ri===startIdx?'xls-row-start':''}"><td class="xls-rownum">${ri+1}</td>`;
      for(let c=0;c<maxCols;c++){
        html += `<td class="${c===nameCol?'xls-col-name':''}${c===grupoCol?' xls-col-grupo':''}">${String(r[c]??'').slice(0,16)}</td>`;
      }
      html += '</tr>';
    });
    html += '</tbody></table>';
    $('#xlsPreview',overlay).innerHTML = html;
  }
  function updateCount(){
    const sr = Math.max(1, parseInt($('#pickStartRow',overlay).value)||1) - 1;
    let nuevos = 0, existentes = 0;
    for(let r=sr;r<raw.length;r++){
      const nombre = String(raw[r][nameCol]??'').trim();
      if(!nombre) continue;
      const yaExiste = state.data.invitados.some(i=>normNombre(i.nombre)===normNombre(nombre));
      if(yaExiste) existentes++; else nuevos++;
    }
    $('#importCount',overlay).textContent = existentes>0
      ? `${nuevos} invitado(s) nuevo(s) · ${existentes} ya existían (se actualizan sin duplicar ni mover de mesa)`
      : `Se importarán ${nuevos} invitado(s) nuevo(s).`;
  }
  renderPreview(); updateCount();

  $('#pickNameCol',overlay).onchange = (e)=>{ nameCol=parseInt(e.target.value); renderPreview(); updateCount(); };
  $('#pickGrupoCol',overlay).onchange = (e)=>{ grupoCol=parseInt(e.target.value); renderPreview(); updateCount(); };
  $('#pickStartRow',overlay).oninput = ()=>{ renderPreview(); updateCount(); };

  $('#doImportBtn',overlay).onclick = async ()=>{
    const sr = Math.max(1, parseInt($('#pickStartRow',overlay).value)||1) - 1;
    let agregados = 0, actualizados = 0;
    for(let r=sr;r<raw.length;r++){
      const nombre = String(raw[r][nameCol] ?? '').trim();
      if(!nombre) continue;
      const grupo = grupoCol>=0 ? String(raw[r][grupoCol] ?? '').trim() : '';
      const existente = state.data.invitados.find(i=>normNombre(i.nombre)===normNombre(nombre));
      if(existente){
        // Ya existía: actualizamos nombre/grupo por si cambiaron, pero
        // NUNCA tocamos mesaId, así conserva la mesa donde ya estaba sentado.
        existente.nombre = nombre;
        if(grupo) existente.grupo = grupo;
        actualizados++;
      } else {
        state.data.invitados.push({ id:uid(), nombre, grupo, mesaId:null });
        agregados++;
      }
    }
    if(agregados===0 && actualizados===0){ alert('No se encontró ningún nombre con esa configuración. Ajusta la columna o la fila de inicio.'); return; }
    await saveShared();
    overlay.remove();
    render();
    alert(actualizados>0
      ? `${agregados} invitado(s) nuevo(s) agregados. ${actualizados} ya existían y se conservó su mesa asignada.`
      : `Se importaron ${agregados} invitado(s).`);
  };
}

function openInvitadoModal(invId){
  const isNew = !invId;
  const inv = isNew ? { id:null, nombre:'', grupo:'', mesaId:null } : state.data.invitados.find(i=>i.id===invId);
  const mesasOpts = [...state.data.mesas].sort((a,b)=>a.numero-b.numero)
    .map(m=>`<option value="${m.id}" ${inv.mesaId===m.id?'selected':''}>Mesa ${m.numero} (${state.data.invitados.filter(i=>i.mesaId===m.id).length}/${m.asientos})</option>`).join('');

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
  <div class="sheet">
    <button class="close-x" id="closeSheet">✕</button>
    <h3>${isNew ? 'Nuevo invitado' : 'Editar invitado'}</h3>
    <div class="field">
      <label>Nombre</label>
      <input id="iNombre" value="${inv.nombre}" placeholder="Nombre del invitado">
    </div>
    <div class="field">
      <label>Grupo o familia (opcional)</label>
      <input id="iGrupo" value="${inv.grupo||''}" placeholder="Ej. Familia de la novia">
    </div>
    <div class="field">
      <label>Mesa asignada</label>
      <select id="iMesa">
        <option value="">Sin mesa</option>
        ${mesasOpts}
      </select>
    </div>
    <button class="btn-primary" id="saveInv">Guardar</button>
    ${!isNew ? `<button class="btn-ghost" id="delInv">Eliminar invitado</button>` : ''}
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };
  $('#closeSheet',overlay).onclick = ()=> overlay.remove();

  $('#saveInv',overlay).onclick = async ()=>{
    const nombre = $('#iNombre',overlay).value.trim();
    if(!nombre){ alert('Escribe el nombre del invitado.'); return; }
    const grupo = $('#iGrupo',overlay).value.trim();
    const mesaId = $('#iMesa',overlay).value || null;
    if(isNew){
      state.data.invitados.push({ id:uid(), nombre, grupo, mesaId });
    } else {
      inv.nombre = nombre; inv.grupo = grupo; inv.mesaId = mesaId;
    }
    await saveShared();
    overlay.remove();
    render();
  };
  if(!isNew){
    $('#delInv',overlay).onclick = async ()=>{
      if(confirm(`¿Eliminar a ${inv.nombre} de la lista de invitados?`)){
        state.data.invitados = state.data.invitados.filter(i=>i.id!==inv.id);
        await saveShared();
        overlay.remove();
        render();
      }
    };
  }
}

function openMesaModal(mesaId){
  const m = state.data.mesas.find(x=>x.id===mesaId);
  const ocupantes = state.data.invitados.filter(i=>i.mesaId===m.id);
  const disponibles = state.data.invitados.filter(i=>!i.mesaId);

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
  <div class="sheet">
    <button class="close-x" id="closeSheet">✕</button>
    <h3>Mesa ${m.numero}</h3>
    <div class="field-row">
      <div class="field">
        <label>Nombre de la mesa</label>
        <input id="mNombre" value="${m.nombre}">
      </div>
      <div class="field" style="max-width:110px;">
        <label>Asientos</label>
        <input id="mAsientos" type="number" min="1" value="${m.asientos}">
      </div>
    </div>
    <button class="btn-ghost" id="saveMesaBtn" style="margin-top:0;">Guardar cambios de la mesa</button>

    <div class="field" style="margin-top:18px;">
      <label>Sentados aquí (${ocupantes.length}/${m.asientos})</label>
      <div id="ocupantesList">
        ${ocupantes.length ? ocupantes.map(i=>`
          <div class="inv-row" style="cursor:default;">
            <div class="inv-mid"><div class="inv-nombre">${i.nombre}</div>${i.grupo?`<div class="inv-grupo">${i.grupo}</div>`:''}</div>
            <button class="gasto-del" data-quitar="${i.id}">Quitar</button>
          </div>`).join('') : `<div class="empty" style="padding:16px;">Nadie sentado todavía en esta mesa.</div>`}
      </div>
    </div>

    <div class="field">
      <label>Agregar invitado a esta mesa</label>
      <select id="addInvSelect">
        <option value="">Elige un invitado sin mesa...</option>
        ${disponibles.map(i=>`<option value="${i.id}">${i.nombre}</option>`).join('')}
      </select>
      <button class="btn-primary" id="addInvBtn" style="margin-top:10px;">Sentar en esta mesa</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };
  $('#closeSheet',overlay).onclick = ()=> overlay.remove();

  $('#saveMesaBtn',overlay).onclick = async ()=>{
    const nombre = $('#mNombre',overlay).value.trim() || m.nombre;
    const asientos = parseInt($('#mAsientos',overlay).value) || m.asientos;
    m.nombre = nombre; m.asientos = asientos;
    await saveShared();
    overlay.remove();
    render();
  };

  $('#addInvBtn',overlay).onclick = async ()=>{
    const invId = $('#addInvSelect',overlay).value;
    if(!invId) return;
    const inv = state.data.invitados.find(i=>i.id===invId);
    if(!inv) return;
    if(ocupantes.length >= m.asientos){
      if(!confirm(`Esta mesa ya tiene ${ocupantes.length} de ${m.asientos} asientos ocupados. ¿Igual quieres sentar a ${inv.nombre} aquí? Puedes ampliar los asientos arriba si prefieres.`)) return;
    }
    inv.mesaId = m.id;
    await saveShared();
    overlay.remove();
    render();
    openMesaModal(mesaId);
  };

  $$('[data-quitar]',overlay).forEach(b=>{
    b.onclick = async ()=>{
      const inv = state.data.invitados.find(i=>i.id===b.getAttribute('data-quitar'));
      if(inv){ inv.mesaId = null; await saveShared(); render(); overlay.remove(); openMesaModal(mesaId); }
    };
  });
}

/* ---------------- bind events ---------------- */
function bindMain(){
  $$('[data-tab]').forEach(el=>{
    el.onclick = ()=>{ state.tab = el.getAttribute('data-tab'); render(); };
  });
  $('#gearBtn').onclick = openSettingsModal;
  $('#fabAdd').onclick = ()=> { state.tab==='mesas' ? openInvitadoModal() : openGastoModal(); };

  if(state.tab==='objetivos'){
    $$('[data-objopen]').forEach(el=>{
      el.onclick = ()=> openObjetivoModal(el.getAttribute('data-objopen'));
    });
    const nb = $('#newObjBtn'); if(nb) nb.onclick = ()=> openObjetivoModal(null);
  }
  if(state.tab==='resumen'){
    $$('[data-obj]').forEach(el=>{
      el.onclick = ()=> openObjetivoModal(el.getAttribute('data-obj'));
    });
  }
  if(state.tab==='gastos'){
    $('#fObjetivo').onchange = e=>{ state.filterObjetivo=e.target.value; render(); };
    $('#fQuien').onchange = e=>{ state.filterQuien=e.target.value; render(); };
    $('#fSearch').oninput = e=>{ state.search=e.target.value; render(); };
  }
  if(state.tab==='mesas'){
    $$('[data-mesasub]').forEach(el=>{
      el.onclick = ()=>{ state.mesasSub = el.getAttribute('data-mesasub'); render(); };
    });
    if(state.mesasSub==='plano'){
      $$('[data-mesaopen]').forEach(el=>{
        el.onclick = ()=> openMesaModal(el.getAttribute('data-mesaopen'));
      });
    }
    if(state.mesasSub==='invitados'){
      $('#fInvSearch').oninput = e=>{ state.invitadosSearch = e.target.value; render(); };
      $('#importXlsBtn').onclick = ()=> $('#xlsInput').click();
      $('#xlsInput').onchange = (e)=>{
        const file = e.target.files[0];
        if(file) handleExcelFile(file);
        e.target.value = '';
      };
      $('#selectModeBtn').onclick = ()=>{
        state.invitadosSelectMode = !state.invitadosSelectMode;
        state.invitadosSelected = new Set();
        render();
      };
      if(state.invitadosSelectMode){
        $('#selectAllBtn').onclick = ()=>{
          const list = getFilteredInvitados();
          const todos = list.length>0 && list.every(i=>state.invitadosSelected.has(i.id));
          if(todos) state.invitadosSelected = new Set();
          else state.invitadosSelected = new Set(list.map(i=>i.id));
          render();
        };
        $('#deleteSelectedBtn').onclick = async ()=>{
          const n = state.invitadosSelected.size;
          if(n===0) return;
          if(confirm(`¿Eliminar ${n} invitado(s) seleccionados? Esta acción no se puede deshacer.`)){
            state.data.invitados = state.data.invitados.filter(i=>!state.invitadosSelected.has(i.id));
            state.invitadosSelected = new Set();
            state.invitadosSelectMode = false;
            await saveShared();
            render();
          }
        };
        $$('[data-invopen]').forEach(el=>{
          el.onclick = ()=>{
            const id = el.getAttribute('data-invopen');
            if(state.invitadosSelected.has(id)) state.invitadosSelected.delete(id);
            else state.invitadosSelected.add(id);
            render();
          };
        });
      } else {
        $$('[data-invopen]').forEach(el=>{
          el.onclick = ()=> openInvitadoModal(el.getAttribute('data-invopen'));
        });
      }
      const wipeBtn = $('#wipeAllBtn');
      if(wipeBtn) wipeBtn.onclick = async ()=>{
        const n = state.data.invitados.length;
        if(confirm(`¿Seguro que quieres borrar TODOS los ${n} invitados de la lista? Las mesas quedarán vacías. Esta acción no se puede deshacer.`)){
          if(confirm('Confirma una vez más: se va a vaciar por completo la lista de invitados.')){
            state.data.invitados = [];
            await saveShared();
            render();
          }
        }
      };
    }
  }
  $$('[data-delgasto]').forEach(el=>{
    el.onclick = async (ev)=>{
      ev.stopPropagation();
      if(confirm('¿Eliminar este gasto?')){
        state.data.gastos = state.data.gastos.filter(g=>g.id!==el.getAttribute('data-delgasto'));
        await saveShared();
        render();
      }
    };
  });
}

      <label>¿Quién lo pagó?</label>
      <div class="seg">
        <button type="button" data-w="novia" id="wNovia">${state.data.parejaNombres.novia}</button>
        <button type="button" data-w="novio" id="wNovio">${state.data.parejaNombres.novio}</button>
      </div>
    </div>
    <button class="btn-primary" id="saveGasto">Guardar gasto</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };
  $('#closeSheet',overlay).onclick = ()=> overlay.remove();

  let who = state.perfil.quien;
  const setWho = w=>{ who=w; $('#wNovia',overlay).classList.toggle('on', w==='novia'); $('#wNovio',overlay).classList.toggle('on', w==='novio'); };
  setWho(who);
  $('#wNovia',overlay).onclick = ()=>setWho('novia');
  $('#wNovio',overlay).onclick = ()=>setWho('novio');

  function refreshCats(){
    const o = state.data.objetivos.find(x=>x.id===$('#gObjetivo',overlay).value);
    const opciones = o.subobjetivos.map(s=>`<option value="${s.id}">${s.nombre}</option>`).join('');
    $('#gCategoria',overlay).innerHTML = opciones + `<option value="__nuevo__">+ Nuevo sub objetivo</option>`;
    $('#gNuevoSub',overlay).style.display = 'none';
    $('#gNuevoSub',overlay).value = '';
  }
  refreshCats();
  $('#gObjetivo',overlay).onchange = refreshCats;
  $('#gCategoria',overlay).onchange = ()=>{
    $('#gNuevoSub',overlay).style.display = $('#gCategoria',overlay).value==='__nuevo__' ? 'block' : 'none';
  };

  $('#saveGasto',overlay).onclick = async ()=>{
    const objetivoId = $('#gObjetivo',overlay).value;
    const monto = parseFloat($('#gMonto',overlay).value);
    const fecha = $('#gFecha',overlay).value || todayISO();
    const descripcion = $('#gDesc',overlay).value.trim();
    if(!monto || monto<=0){ alert('Ingresa un monto válido.'); return; }
    const obj = state.data.objetivos.find(o=>o.id===objetivoId);
    let subobjetivoId = $('#gCategoria',overlay).value;
    if(subobjetivoId==='__nuevo__'){
      const nombre = $('#gNuevoSub',overlay).value.trim();
      if(!nombre){ alert('Escribe el nombre del nuevo sub objetivo.'); return; }
      const nuevo = { id:uid(), nombre, meta:null };
      obj.subobjetivos.push(nuevo);
      subobjetivoId = nuevo.id;
    }
    if(!subobjetivoId){ alert('Elige un sub objetivo.'); return; }
    state.data.gastos.push({ id:uid(), objetivoId, subobjetivoId, monto, fecha, descripcion, quien:who });
    await saveShared();
    overlay.remove();
    render();
  };
}

/* ---------------- modal: objetivo (crear/editar) ---------------- */
function openObjetivoModal(objId){
  const isNew = !objId;
  const obj = isNew ? { id:null, nombre:'', icono:'💍', tint:'rose', meta:null, subobjetivos:[] } : state.data.objetivos.find(o=>o.id===objId);
  let icono = obj.icono, tintSel = obj.tint;
  let subs = obj.subobjetivos.map(s=>({...s}));
  let editingId = null; // si se está editando un sub objetivo existente (clic en su chip)

  const overlay = document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML = `
  <div class="sheet">
    <button class="close-x" id="closeSheet">✕</button>
    <h3>${isNew ? 'Nuevo objetivo' : obj.nombre}</h3>
    <div class="field">
      <label>Nombre</label>
      <input id="oNombre" value="${obj.nombre}" placeholder="Ej. Casa, Terreno, Viaje...">
    </div>
    <div class="field">
      <label>Ícono</label>
      <div class="icon-pick" id="iconPick">
        ${ICONS.map(i=>`<button type="button" data-i="${i}" class="${i===icono?'on':''}">${i}</button>`).join('')}
      </div>
    </div>
    <div class="field">
      <label>Color</label>
      <div class="tint-pick" id="tintPick">
        ${TINTS.map(t=>`<div class="sw ${t.id===tintSel?'on':''}" data-t="${t.id}" style="background:${t.fg}"></div>`).join('')}
      </div>
    </div>
    <div class="field">
      <label>Meta de presupuesto en ${currSym()} (opcional)</label>
      <input id="oMeta" type="number" min="0" step="0.01" value="${obj.meta || ''}" placeholder="Ej. 15000">
    </div>
    <div class="field">
      <label>Sub objetivos <span style="font-weight:400;color:var(--ink-dim);">(la suma de todos forma el total de este objetivo)</span></label>
      <div class="cat-manage" id="catManage">
        ${subs.map(s=>`<span class="cat-chip" data-editsub="${s.id}">${s.nombre}${s.meta ? ` · meta ${fmt(s.meta)}` : ''}<button data-rmcat="${s.id}">✕</button></span>`).join('')}
      </div>
      <p style="font-size:11px;color:var(--ink-dim);margin:8px 0 0;">Toca un sub objetivo para editarlo.</p>
      <div class="field" style="margin-top:10px;margin-bottom:8px;">
        <label style="font-weight:400;">Nombre del sub objetivo</label>
        <input id="newCatInput" placeholder="Ej. Fotografía y Video">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label style="font-weight:400;">Monto que planean gastar en esto (opcional)</label>
        <input id="newCatMeta" type="number" min="0" step="0.01" placeholder="Ej. 3000">
      </div>
      <button type="button" id="addCatBtn" class="btn-ghost" style="margin-top:10px;">Agregar sub objetivo</button>
    </div>
    <button class="btn-primary" id="saveObj">${isNew ? 'Crear objetivo' : 'Guardar cambios'}</button>
    ${!isNew ? `<button class="btn-ghost" id="delObj">Eliminar objetivo</button>` : ''}
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };
  $('#closeSheet',overlay).onclick = ()=> overlay.remove();

  $$('#iconPick button',overlay).forEach(b=>{
    b.onclick = ()=>{ icono=b.getAttribute('data-i'); $$('#iconPick button',overlay).forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
  });
  $$('#tintPick .sw',overlay).forEach(b=>{
    b.onclick = ()=>{ tintSel=b.getAttribute('data-t'); $$('#tintPick .sw',overlay).forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
  });
  function renderCats(){
    $('#catManage',overlay).innerHTML = subs.map(s=>`<span class="cat-chip" data-editsub="${s.id}">${s.nombre}${s.meta ? ` · meta ${fmt(s.meta)}` : ''}<button data-rmcat="${s.id}">✕</button></span>`).join('') || `<span style="font-size:12px;color:var(--ink-dim)">Sin sub objetivos todavía</span>`;
    $$('[data-rmcat]',overlay).forEach(b=>{
      b.onclick = (ev)=>{
        ev.stopPropagation();
        subs = subs.filter(s=>s.id!==b.getAttribute('data-rmcat'));
        if(editingId===b.getAttribute('data-rmcat')) cancelEdit();
        renderCats();
      };
    });
    $$('[data-editsub]',overlay).forEach(chip=>{
      chip.onclick = ()=>{
        const s = subs.find(x=>x.id===chip.getAttribute('data-editsub'));
        if(!s) return;
        editingId = s.id;
        $('#newCatInput',overlay).value = s.nombre;
        $('#newCatMeta',overlay).value = s.meta || '';
        $('#addCatBtn',overlay).textContent = 'Guardar cambios';
        $('#newCatInput',overlay).scrollIntoView({block:'center', behavior:'smooth'});
        $('#newCatInput',overlay).focus();
      };
    });
  }
  function cancelEdit(){
    editingId = null;
    $('#newCatInput',overlay).value='';
    $('#newCatMeta',overlay).value='';
    $('#addCatBtn',overlay).textContent = 'Agregar sub objetivo';
  }
  renderCats();
  $('#addCatBtn',overlay).onclick = ()=>{
    const nombre = $('#newCatInput',overlay).value.trim();
    const metaVal = parseFloat($('#newCatMeta',overlay).value);
    const meta = metaVal>0 ? metaVal : null;
    if(!nombre){ alert('Escribe el nombre del sub objetivo.'); return; }
    if(editingId){
      const s = subs.find(x=>x.id===editingId);
      if(s){ s.nombre=nombre; s.meta=meta; }
    } else {
      subs.push({ id:uid(), nombre, meta });
    }
    cancelEdit();
    renderCats();
  };

  $('#saveObj',overlay).onclick = async ()=>{
    const nombre = $('#oNombre',overlay).value.trim();
    if(!nombre){ alert('Ponle un nombre al objetivo.'); return; }
    if(subs.length===0){ alert('Agrega al menos un sub objetivo.'); return; }
    const metaVal = parseFloat($('#oMeta',overlay).value);
    const meta = metaVal>0 ? metaVal : null;
    if(isNew){
      state.data.objetivos.push({ id:uid(), nombre, icono, tint:tintSel, meta, subobjetivos:subs });
    } else {
      obj.nombre=nombre; obj.icono=icono; obj.tint=tintSel; obj.meta=meta; obj.subobjetivos=subs;
    }
    await saveShared();
    overlay.remove();
    render();
  };

  if(!isNew){
    $('#delObj',overlay).onclick = async ()=>{
      const count = state.data.gastos.filter(g=>g.objetivoId===obj.id).length;
      const msg = count>0
        ? `Este objetivo tiene ${count} gasto(s) registrados. Se eliminarán también. ¿Continuar?`
        : '¿Eliminar este objetivo?';
      if(confirm(msg)){
        state.data.gastos = state.data.gastos.filter(g=>g.objetivoId!==obj.id);
        state.data.objetivos = state.data.objetivos.filter(o=>o.id!==obj.id);
        await saveShared();
        overlay.remove();
        render();
      }
    };
  }
}

/* ---------------- modal: settings ---------------- */
function openSettingsModal(){
  const overlay = document.createElement('div');
  overlay.className='overlay';
  const n = state.data.parejaNombres;
  overlay.innerHTML = `
  <div class="sheet">
    <button class="close-x" id="closeSheet">✕</button>
    <h3>Ajustes</h3>
    <div class="field">
      <label>Nombre de la novia</label>
      <input id="sNovia" value="${n.novia}">
    </div>
    <div class="field">
      <label>Nombre del novio</label>
      <input id="sNovio" value="${n.novio}">
    </div>
    <div class="field">
      <label>¿Quién eres tú en este dispositivo?</label>
      <div class="seg">
        <button type="button" data-w="novia" id="sWNovia">Novia</button>
        <button type="button" data-w="novio" id="sWNovio">Novio</button>
      </div>
    </div>
    <div class="field">
      <label>Moneda</label>
      <div class="seg">
        <button type="button" data-m="PEN" id="sMonPEN">Soles (S/)</button>
        <button type="button" data-m="USD" id="sMonUSD">Dólares ($)</button>
      </div>
    </div>
    <button class="btn-primary" id="saveSettings">Guardar</button>
    <p style="text-align:center;font-size:11px;color:var(--ink-dim);margin-top:14px;line-height:1.5;">
      Los nombres y objetivos se comparten entre ambos dispositivos. Quién eres tú se guarda solo en este dispositivo.
    </p>
    <div style="text-align:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);">
      <p style="font-size:12px;color:var(--ink-dim);margin:0 0 10px;">Unidos · versión ${APP_VERSION}</p>
      <button type="button" class="btn-ghost" id="checkUpdateBtn" style="margin:0;">Buscar actualizaciones</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e=>{ if(e.target===overlay) overlay.remove(); };
  $('#closeSheet',overlay).onclick = ()=> overlay.remove();

  $('#checkUpdateBtn',overlay).onclick = async ()=>{
    const btn = $('#checkUpdateBtn',overlay);
    btn.textContent = 'Buscando...';
    try{
      if('serviceWorker' in navigator){
        const reg = await navigator.serviceWorker.getRegistration();
        if(reg){
          await reg.update();
          if(reg.waiting){
            btn.textContent = 'Buscar actualizaciones';
            showUpdateBanner(reg);
            overlay.remove();
            return;
          }
        }
      }
      btn.textContent = 'Ya tienes la última versión';
      setTimeout(()=>{ if(document.body.contains(btn)) btn.textContent='Buscar actualizaciones'; }, 2500);
    }catch(e){
      btn.textContent = 'No se pudo revisar, intenta luego';
      setTimeout(()=>{ if(document.body.contains(btn)) btn.textContent='Buscar actualizaciones'; }, 2500);
    }
  };

  let who = state.perfil.quien;
  const setWho = w=>{ who=w; $('#sWNovia',overlay).classList.toggle('on', w==='novia'); $('#sWNovio',overlay).classList.toggle('on', w==='novio'); };
  setWho(who);
  $('#sWNovia',overlay).onclick=()=>setWho('novia');
  $('#sWNovio',overlay).onclick=()=>setWho('novio');

  let moneda = state.data.moneda || 'PEN';
  const setMoneda = m=>{ moneda=m; $('#sMonPEN',overlay).classList.toggle('on', m==='PEN'); $('#sMonUSD',overlay).classList.toggle('on', m==='USD'); };
  setMoneda(moneda);
  $('#sMonPEN',overlay).onclick=()=>setMoneda('PEN');
  $('#sMonUSD',overlay).onclick=()=>setMoneda('USD');

  $('#saveSettings',overlay).onclick = async ()=>{
    state.data.parejaNombres = {
      novia: $('#sNovia',overlay).value.trim() || 'Novia',
      novio: $('#sNovio',overlay).value.trim() || 'Novio',
    };
    state.data.moneda = moneda;
    await saveShared();
    state.perfil.quien = who;
    await savePerfil();
    overlay.remove();
    render();
  };
}

/* ---------------- boot ---------------- */
async function boot(){
  const resultado = await loadShared();
  if(resultado.ok){
    state.data = resultado.data || defaultData();
    if(!state.data.moneda) state.data.moneda = 'PEN';
    const migrado = migrateData(state.data);
    // Solo escribimos en la base de datos compartida si de verdad no había
    // fila todavía (primera vez) o si hubo que migrar datos viejos.
    // Nunca se escribe aquí por culpa de un fallo de red.
    if(!resultado.data || migrado) await saveShared();
  } else {
    // No se pudo conectar (por ejemplo, justo después de actualizar la app).
    // Usamos la última copia guardada en este dispositivo y NO tocamos la
    // base de datos compartida, para no arriesgarnos a borrar nada.
    let cache = null;
    try{ const raw = localStorage.getItem('unidos_data_cache'); cache = raw ? JSON.parse(raw) : null; }catch(e){}
    state.data = cache || defaultData();
    if(!state.data.moneda) state.data.moneda = 'PEN';
    migrateData(state.data);
    showOfflineBanner();
  }
  state.perfil = await loadPerfil();
  render();

  if(SUPABASE_URL && SUPABASE_ANON_KEY){
    setInterval(async ()=>{
      // No interrumpir si todavía no terminó de configurar su perfil (onboarding)
      if(!state.perfil || !state.perfil.quien) return;
      // No interrumpir si hay un modal/formulario abierto
      if(document.querySelector('.overlay')) return;
      // No interrumpir si está escribiendo en cualquier campo de la pantalla principal
      const activo = document.activeElement;
      if(activo && ['INPUT','TEXTAREA','SELECT'].includes(activo.tagName)) return;
      const resultado = await loadShared();
      if(resultado.ok && resultado.data){
        state.data = resultado.data;
        if(migrateData(state.data)) await saveShared();
        render();
      }
    }, 12000);
  }
}
boot();

function showOfflineBanner(){
  if (document.getElementById('offBanner')) return;
  const el = document.createElement('div');
  el.id = 'offBanner';
  el.className = 'upd-banner';
  el.style.background = 'var(--danger)';
  el.innerHTML = `
    <span>No se pudo conectar para sincronizar. Mostrando la última versión guardada en este dispositivo.</span>
    <button class="upd-close" id="offClose">✕</button>
  `;
  document.body.appendChild(el);
  document.getElementById('offClose').onclick = () => el.remove();
}

if ('serviceWorker' in navigator) {
  let actualizacionAceptada = false; // solo se vuelve true si el usuario toca "Actualizar"

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      // revisa si hay una versión nueva publicada cada 5 minutos mientras la app está abierta
      setInterval(() => reg.update().catch(()=>{}), 5 * 60 * 1000);

      // si ya había una versión esperando cuando se abrió la app
      if (reg.waiting) showUpdateBanner(reg);

      reg.addEventListener('updatefound', () => {
        const nuevo = reg.installing;
        if (!nuevo) return;
        nuevo.addEventListener('statechange', () => {
          if (nuevo.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(reg);
          }
        });
      });

      window.__unidosMarcarActualizacion = () => { actualizacionAceptada = true; };
    }).catch(() => {});

    let yaRecargo = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      // Ignora el cambio de controlador que ocurre la primera vez que el
      // Service Worker toma control de la página (por ejemplo, al abrir la
      // app recién instalada). Sin este chequeo, la app se recargaba sola
      // justo cuando alguien estaba escribiendo su nombre por primera vez.
      if (!actualizacionAceptada) return;
      if (yaRecargo) return;
      yaRecargo = true;
      window.location.reload();
    });
  });
}

function showUpdateBanner(reg){
  if (document.getElementById('updBanner')) return;
  const el = document.createElement('div');
  el.id = 'updBanner';
  el.className = 'upd-banner';
  el.innerHTML = `
    <span>Hay una nueva versión de Unidos disponible.</span>
    <button id="updGo">Actualizar</button>
    <button class="upd-close" id="updClose">✕</button>
  `;
  document.body.appendChild(el);
  document.getElementById('updGo').onclick = () => {
    if (window.__unidosMarcarActualizacion) window.__unidosMarcarActualizacion();
    if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
  };
  document.getElementById('updClose').onclick = () => el.remove();
}
</script>
